name: safetyproject
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6
  avatar_glow: ^3.0.1
  firebase_auth: ^5.0.0
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  geocoding: ^3.0.0
  geolocator: ^13.0.0
  url_launcher: ^6.3.0
  flutter_sms: ^2.3.2
  location: ^8.0.0
  google_maps_flutter: ^2.9.0
  provider: ^6.1.0
  flutter_polyline_points: ^2.0.0
  http: ^1.2.0
  shake: ^2.2.0
  audioplayers: ^6.0.0
  animated_splash_screen: ^1.3.0
  flutter_phone_direct_caller: ^2.1.1
  sqflite: ^2.3.0
  firebase_database: ^11.0.0
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
  flutter_launcher_icons: ^0.14.0
  share_plus: ^10.0.0
  flutter_native_splash: ^2.4.0
  get_it: ^8.0.0
  characters: ^1.4.0

