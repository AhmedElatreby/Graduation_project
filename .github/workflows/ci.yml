name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/README.md'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: analyze, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      # lib/secrets.dart is gitignored (holds the Maps API key); analyze and
      # debug builds only need it to exist
      - name: Create placeholder secrets.dart
        run: |
          cat > lib/secrets.dart <<'EOF'
          class Secrets {
            static const API_KEY = 'ci-placeholder';
          }
          EOF

      - run: flutter pub get

      # info-level lints (51 as of 2026-07) don't fail the build; errors and
      # warnings still do
      - run: flutter analyze --no-fatal-infos

      - run: flutter test

      - run: flutter build apk --debug
